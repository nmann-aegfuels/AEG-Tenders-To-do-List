<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>AEG Fuels — Tender Dashboard</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
<style>
  :root {
    --navy: #1c2e5a;
    --navy-dark: #162247;
    --navy-mid: #243870;
    --navy-light: #e8ecf5;
    --silver: #8a9ab5;
    --silver-light: #d6dde9;
    --silver-bg: #f0f3f8;
    --bg: #f2f4f8;
    --surface: #ffffff;
    --surface2: #f5f7fb;
    --border: rgba(28,46,90,0.10);
    --border-strong: rgba(28,46,90,0.18);
    --text: #111827;
    --text-muted: #4a5568;
    --text-hint: #8a9ab5;
    --blue-bg: #e8ecf5; --blue-text: #1c2e5a; --blue-border: #243870;
    --green-bg: #e6f4ef; --green-text: #155a3a; --green-border: #1d7a50;
    --amber-bg: #fef3e2; --amber-text: #7a4a0a; --amber-border: #b97a1a;
    --red-bg: #fceaea; --red-text: #7a1c1c; --red-border: #b93a3a;
    --gray-bg: #eef0f4; --gray-text: #3a4560; --gray-border: #6a7a99;
    --purple-bg: #eeebfa; --purple-text: #3c2e88; --purple-border: #5a48c0;
    --radius: 6px; --radius-lg: 10px;
    --font: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
  }
  @media (prefers-color-scheme: dark) {
    :root {
      --bg: #0f1622; --surface: #172035; --surface2: #1d2a44;
      --border: rgba(180,200,240,0.10); --border-strong: rgba(180,200,240,0.20);
      --text: #e8edf7; --text-muted: #8a9ab5; --text-hint: #4a5a78;
      --navy-light: #1d2a44; --silver-bg: #1a2338;
      --blue-bg: #1c2e5a; --blue-text: #a8bcdf;
      --green-bg: #0f3326; --green-text: #7ecba8;
      --amber-bg: #3a2508; --amber-text: #f0b84a;
      --red-bg: #3a1010; --red-text: #f08080;
      --gray-bg: #1d2440; --gray-text: #8a9ab5;
      --purple-bg: #1e1a40; --purple-text: #a89ae0;
    }
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: var(--font); background: var(--bg); color: var(--text); min-height: 100vh; }

  /* ── Header ── */
  .header {
    background: var(--navy);
    border-bottom: 1px solid var(--navy-dark);
    padding: 0 2rem;
    display: flex; align-items: center; justify-content: space-between;
    height: 58px; position: sticky; top: 0; z-index: 100;
  }
  .header-left { display: flex; align-items: center; gap: 18px; }
  .logo-img { height: 30px; width: auto; display: block; filter: brightness(0) invert(1); }
  .header-divider { width: 1px; height: 24px; background: rgba(255,255,255,0.2); }
  .header-title { font-size: 13px; font-weight: 500; color: rgba(255,255,255,0.7); letter-spacing: 0.5px; text-transform: uppercase; }
  .header-right { display: flex; align-items: center; gap: 8px; }

  /* ── Buttons ── */
  .btn { display: inline-flex; align-items: center; gap: 6px; padding: 6px 14px; border-radius: var(--radius); border: 1px solid rgba(255,255,255,0.25); background: rgba(255,255,255,0.08); color: rgba(255,255,255,0.85); font-size: 13px; font-weight: 500; cursor: pointer; font-family: var(--font); transition: background 0.15s; }
  .btn:hover { background: rgba(255,255,255,0.15); }
  .btn svg { width: 14px; height: 14px; stroke: currentColor; fill: none; stroke-width: 2; flex-shrink:0; }
  .btn-surface { border: 0.5px solid var(--border-strong); background: var(--surface); color: var(--text); }
  .btn-surface:hover { background: var(--surface2); }
  .btn-navy { background: var(--navy); color: #fff; border-color: var(--navy-mid); }
  .btn-navy:hover { background: var(--navy-mid); }
  .btn-sm { padding: 4px 10px; font-size: 12px; }

  /* ── Config bar ── */
  .config-bar { background: var(--surface2); border-bottom: 0.5px solid var(--border); padding: 10px 2rem; display: flex; align-items: center; gap: 10px; }
  .config-bar input { flex: 1; max-width: 520px; padding: 6px 12px; border-radius: var(--radius); border: 0.5px solid var(--border-strong); background: var(--surface); color: var(--text); font-size: 13px; font-family: var(--font); }
  .config-bar input:focus { outline: none; border-color: var(--navy); box-shadow: 0 0 0 3px rgba(28,46,90,0.12); }
  .config-bar label { font-size: 13px; color: var(--text-muted); white-space: nowrap; font-weight: 500; }
  .status-pill { font-size: 12px; padding: 3px 10px; border-radius: 20px; font-weight: 500; }
  .status-ok     { background: var(--green-bg);  color: var(--green-text);  }
  .status-error  { background: var(--red-bg);    color: var(--red-text);    }
  .status-loading{ background: var(--amber-bg);  color: var(--amber-text);  }

  /* ── Main layout ── */
  .main { padding: 1.5rem 2rem; }

  /* ── Stat cards ── */
  .stats-row { display: grid; grid-template-columns: repeat(auto-fit, minmax(150px, 1fr)); gap: 10px; margin-bottom: 1.5rem; }
  .stat-card { background: var(--surface); border: 0.5px solid var(--border); border-radius: var(--radius-lg); padding: 14px 16px; }
  .stat-label { font-size: 11px; font-weight: 500; color: var(--text-hint); text-transform: uppercase; letter-spacing: 0.6px; margin-bottom: 6px; }
  .stat-value { font-size: 26px; font-weight: 600; }
  .stat-value.navy  { color: var(--navy); }
  .stat-value.amber { color: var(--amber-text); }
  .stat-value.red   { color: var(--red-text); }
  .stat-value.green { color: var(--green-text); }

  /* ── Toolbar ── */
  .toolbar { display: flex; align-items: center; gap: 10px; margin-bottom: 1rem; flex-wrap: wrap; }
  .search-box { position: relative; flex: 1; min-width: 200px; max-width: 320px; }
  .search-box svg { position: absolute; left: 10px; top: 50%; transform: translateY(-50%); width: 14px; height: 14px; stroke: var(--text-hint); fill: none; stroke-width: 2; pointer-events: none; }
  .search-box input { width: 100%; padding: 7px 12px 7px 32px; border-radius: var(--radius); border: 0.5px solid var(--border-strong); background: var(--surface); color: var(--text); font-size: 13px; font-family: var(--font); }
  .search-box input:focus { outline: none; border-color: var(--navy); box-shadow: 0 0 0 3px rgba(28,46,90,0.1); }
  select { padding: 7px 10px; border-radius: var(--radius); border: 0.5px solid var(--border-strong); background: var(--surface); color: var(--text); font-size: 13px; font-family: var(--font); cursor: pointer; }
  select:focus { outline: none; }
  .result-count { font-size: 12px; color: var(--text-hint); margin-left: auto; }

  /* ── Table ── */
  .table-wrap { background: var(--surface); border-radius: var(--radius-lg); border: 0.5px solid var(--border); overflow: hidden; }
  table { width: 100%; border-collapse: collapse; font-size: 13px; table-layout: fixed; }
  thead { background: var(--navy); }
  th { padding: 10px 14px; text-align: left; font-weight: 500; font-size: 11px; color: rgba(255,255,255,0.65); border-bottom: 1px solid rgba(255,255,255,0.08); letter-spacing: 0.5px; text-transform: uppercase; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; cursor: pointer; user-select: none; }
  th:hover { color: #fff; }
  td { padding: 11px 14px; border-bottom: 0.5px solid var(--border); vertical-align: middle; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
  tr:last-child td { border-bottom: none; }
  tr:hover td { background: var(--navy-light); }

  /* ── Badges ── */
  .badge { display: inline-block; font-size: 11px; font-weight: 600; padding: 2px 9px; border-radius: 20px; white-space: nowrap; letter-spacing: 0.3px; }
  .badge-active    { background: var(--blue-bg);   color: var(--blue-text);   }
  .badge-awarded   { background: var(--green-bg);  color: var(--green-text);  }
  .badge-closed    { background: var(--gray-bg);   color: var(--gray-text);   }
  .badge-draft     { background: var(--purple-bg); color: var(--purple-text); }
  .badge-cancelled { background: var(--red-bg);    color: var(--red-text);    }
  .badge-review    { background: var(--amber-bg);  color: var(--amber-text);  }

  /* ── Deadline colours ── */
  .dl-urgent { color: var(--red-text);   font-weight: 600; }
  .dl-soon   { color: var(--amber-text); font-weight: 600; }
  .dl-ok     { color: var(--text); }
  .dl-past   { color: var(--text-hint);  text-decoration: line-through; }
  .days-tag  { font-size: 11px; margin-left: 4px; }

  /* ── Assignee cell ── */
  .assignee-cell { display: flex; align-items: center; gap: 7px; }
  .avatar { width: 24px; height: 24px; border-radius: 50%; font-size: 9px; font-weight: 600; display: inline-flex; align-items: center; justify-content: center; flex-shrink: 0; background: var(--navy-light); color: var(--navy); }

  /* ── Empty / footer ── */
  .empty-state { text-align: center; padding: 4rem 2rem; color: var(--text-muted); }
  .empty-state svg { width: 36px; height: 36px; stroke: var(--text-hint); fill: none; stroke-width: 1.5; margin: 0 auto 12px; display: block; }
  .empty-state p { font-size: 14px; }
  .empty-state small { font-size: 12px; color: var(--text-hint); margin-top: 4px; display: block; }
  .table-footer { font-size: 12px; color: var(--text-hint); padding: 9px 14px; text-align: right; border-top: 0.5px solid var(--border); background: var(--surface2); }

  /* ── Column widths ── */
  .col-id       { width: 7%;  }
  .col-title    { width: 22%; }
  .col-status   { width: 10%; }
  .col-assignee { width: 14%; }
  .col-deadline { width: 13%; }
  .col-value    { width: 10%; }
  .col-org      { width: 14%; }
  .col-category { width: 10%; }

  @media (max-width: 900px) {
    .main { padding: 1rem; }
    .header, .config-bar { padding: 0 1rem; }
    .config-bar { padding-top: 10px; padding-bottom: 10px; flex-wrap: wrap; }
    .col-org, .col-category, .col-value { display: none; }
  }
</style>
</head>

<script>
let allTenders = [];
const SAVE_KEY = 'aegfuels_tender_url';
window.onload = () => { const s = localStorage.getItem(SAVE_KEY); if (s) document.getElementById('xlsx-url').value = s; };

function setStatus(type, text) {
  const el = document.getElementById('sync-status');
  el.className = 'status-pill status-' + type;
  el.textContent = text;
}

async function loadData() {
  const url = document.getElementById('xlsx-url').value.trim();
  if (!url) { setStatus('error', 'No URL'); return; }
  localStorage.setItem(SAVE_KEY, url);
  setStatus('loading', 'Fetching…');
  try {
    const res = await fetch(url, { cache: 'no-cache' });
    if (!res.ok) throw new Error('HTTP ' + res.status);
    const buf = await res.arrayBuffer();
    const wb = XLSX.read(buf, { type: 'array', cellDates: true });
    const ws = wb.Sheets[wb.SheetNames[0]];
    allTenders = XLSX.utils.sheet_to_json(ws, { defval: '' }).map(normalise);
    updateStats(); populateAssigneeFilter(); renderTable();
    document.getElementById('last-updated').textContent = 'Last loaded: ' + new Date().toLocaleString();
    setStatus('ok', 'Live ✓');
  } catch(e) { setStatus('error', 'Error: ' + e.message); }
}

function normalise(row) {
  const find = (...keys) => { for (const k of keys) { const m = Object.keys(row).find(r => r.trim().toLowerCase() === k.toLowerCase()); if (m !== undefined) return row[m]; } return ''; };
  return {
    id:       String(find('id','tender id','ref','reference') || ''),
    title:    String(find('title','tender title','name','description') || ''),
    status:   String(find('status','state') || 'Active'),
    assignee: String(find('assignee','assigned to','owner','contact','manager') || ''),
    deadline: parseDate(find('deadline','due date','due','submission date','close date')),
    value:    find('value','contract value','budget','amount','estimated value'),
    org:      String(find('organisation','organization','client','authority','entity') || ''),
    category: String(find('category','type','sector') || ''),
  };
}

function parseDate(v) { if (!v) return null; if (v instanceof Date) return v; const d = new Date(v); return isNaN(d) ? null : d; }

function formatDate(d) { if (!d) return '—'; return d.toLocaleDateString('en-GB', { day:'2-digit', month:'short', year:'numeric' }); }

function daysUntil(d) { if (!d) return null; const now = new Date(); now.setHours(0,0,0,0); return Math.round((d - now) / 86400000); }

function formatValue(v) {
  if (v === '' || v === null || v === undefined) return '—';
  const n = parseFloat(String(v).replace(/[^0-9.-]/g,''));
  if (isNaN(n)) return String(v);
  return new Intl.NumberFormat('en-GB', { style:'currency', currency:'GBP', maximumFractionDigits:0 }).format(n);
}

function statusBadge(s) {
  const map = { active:'badge-active', awarded:'badge-awarded', closed:'badge-closed', draft:'badge-draft', cancelled:'badge-cancelled', review:'badge-review' };
  const key = (s||'').toLowerCase().replace(/\s+/g,'');
  const cls = map[key] || map[Object.keys(map).find(k => key.includes(k))] || 'badge-closed';
  return '<span class="badge ' + cls + '">' + (s || 'Unknown') + '</span>';
}

function deadlineCell(d) {
  if (!d) return '<span style="color:var(--text-hint)">—</span>';
  const days = daysUntil(d);
  let cls = 'dl-ok', tag = '';
  if (days < 0)       { cls = 'dl-past';   tag = '<span class="days-tag" style="color:var(--red-text)">' + Math.abs(days) + 'd overdue</span>'; }
  else if (days <= 3) { cls = 'dl-urgent'; tag = '<span class="days-tag" style="color:var(--red-text)">' + days + 'd left</span>'; }
  else if (days <= 7) { cls = 'dl-soon';   tag = '<span class="days-tag" style="color:var(--amber-text)">' + days + 'd left</span>'; }
  return '<span class="' + cls + '">' + formatDate(d) + tag + '</span>';
}

function initials(n) { if (!n) return '?'; return n.split(/\s+/).map(w=>w[0]).join('').slice(0,2).toUpperCase(); }

const AVATAR_COLORS = [
  ['var(--blue-bg)','var(--navy)'],
  ['var(--green-bg)','var(--green-text)'],
  ['var(--amber-bg)','var(--amber-text)'],
  ['var(--purple-bg)','var(--purple-text)'],
  ['var(--silver-bg)','var(--navy)'],
];
function avatarStyle(name) {
  let h = 0; for(const c of name) h = (h*31 + c.charCodeAt(0)) % AVATAR_COLORS.length;
  return 'background:' + AVATAR_COLORS[h][0] + ';color:' + AVATAR_COLORS[h][1];
}

function updateStats() {
  const now = new Date(); now.setHours(0,0,0,0);
  const week = new Date(now); week.setDate(week.getDate()+7);
  document.getElementById('stat-total').textContent   = allTenders.length;
  document.getElementById('stat-active').textContent  = allTenders.filter(t=>(t.status||'').toLowerCase()==='active').length;
  document.getElementById('stat-week').textContent    = allTenders.filter(t=>t.deadline&&t.deadline>=now&&t.deadline<=week).length;
  document.getElementById('stat-overdue').textContent = allTenders.filter(t=>t.deadline&&t.deadline<now&&!['awarded','closed'].includes((t.status||'').toLowerCase())).length;
  document.getElementById('stat-awarded').textContent = allTenders.filter(t=>(t.status||'').toLowerCase()==='awarded').length;
}

function populateAssigneeFilter() {
  const sel = document.getElementById('filter-assignee');
  const cur = sel.value;
  const names = [...new Set(allTenders.map(t=>t.assignee).filter(Boolean))].sort();
  sel.innerHTML = '<option value="">All assignees</option>' + names.map(n=>'<option value="'+n+'">'+n+'</option>').join('');
  if (names.includes(cur)) sel.value = cur;
}

function renderTable() {
  const search   = document.getElementById('search').value.toLowerCase();
  const fStatus  = document.getElementById('filter-status').value.toLowerCase();
  const fAssign  = document.getElementById('filter-assignee').value;
  const sortCol  = document.getElementById('sort-col').value;

  let rows = allTenders.filter(t => {
    if (fStatus && !(t.status||'').toLowerCase().includes(fStatus)) return false;
    if (fAssign && t.assignee !== fAssign) return false;
    if (search && ![t.id,t.title,t.assignee,t.org,t.category].join(' ').toLowerCase().includes(search)) return false;
    return true;
  });

  rows.sort((a,b) => {
    if (sortCol==='deadline') { if (!a.deadline&&!b.deadline) return 0; if (!a.deadline) return 1; if (!b.deadline) return -1; return a.deadline-b.deadline; }
    if (sortCol==='value') return (parseFloat(b.value)||0)-(parseFloat(a.value)||0);
    const av=String(a[sortCol]||'').toLowerCase(), bv=String(b[sortCol]||'').toLowerCase();
    return av<bv?-1:av>bv?1:0;
  });

  document.getElementById('result-count').textContent = rows.length + ' of ' + allTenders.length + ' tenders';

  const tbody = document.getElementById('table-body');
  if (!rows.length) {
    tbody.innerHTML = '<tr><td colspan="8"><div class="empty-state"><svg viewBox="0 0 24 24"><circle cx="11" cy="11" r="8"/><path d="m21 21-4.35-4.35"/></svg><p>No tenders match your filters</p><small>Try adjusting the search or filter options.</small></div></td></tr>';
    return;
  }

  tbody.innerHTML = rows.map(t => '<tr>' +
    '<td title="'+t.id+'" style="color:var(--text-hint);font-size:12px">'+( t.id||'—')+'</td>' +
    '<td title="'+t.title+'" style="white-space:normal;word-break:break-word;line-height:1.4;font-weight:500">'+( t.title||'—')+'</td>' +
    '<td>'+statusBadge(t.status)+'</td>' +
    '<td><div class="assignee-cell"><span class="avatar" style="'+avatarStyle(t.assignee)+'">'+initials(t.assignee)+'</span><span title="'+t.assignee+'" style="overflow:hidden;text-overflow:ellipsis">'+( t.assignee||'—')+'</span></div></td>' +
    '<td style="white-space:normal">'+deadlineCell(t.deadline)+'</td>' +
    '<td style="color:var(--text-muted)">'+formatValue(t.value)+'</td>' +
    '<td title="'+t.org+'" style="color:var(--text-muted)">'+( t.org||'—')+'</td>' +
    '<td><span style="font-size:11px;color:var(--text-hint)">'+( t.category||'—')+'</span></td>' +
    '</tr>'
  ).join('');
}
